<!-- GLOBAL HUGO TICKER FOOTER -->
<div id="newsticker" style="position:fixed !important; bottom:0 !important; left:0 !important; right:0 !important; z-index:999999 !important; background:rgba(0,0,0,0.92) !important; border-top:1px solid rgba(255,69,0,0.35) !important; display:flex !important; align-items:center; height:28px !important; overflow:hidden; font-family:'Courier New', monospace !important; visibility: visible !important; opacity: 1 !important;">
    <span class="ticker-label" style="flex-shrink:0; font-size:0.6rem; letter-spacing:2px; color:rgba(255,69,0,0.7); padding:0 15px; border-right:1px solid rgba(255,69,0,0.2); white-space:nowrap; height:100%; display:flex; align-items:center; background:rgba(255,69,0,0.05);">// SYSTEM_LOG_FEED</span>
    <div class="ticker-track-wrap" style="flex:1; overflow:hidden; height:100%; display:flex; align-items:center;">
        <div class="ticker-track" id="ticker-track-global" style="display:inline-flex; white-space:nowrap; animation: ticker-scroll 45s linear infinite;">
            <span class="ticker-item" style="font-size:0.65rem; letter-spacing:1px; color:rgba(212,175,55,0.7); padding:0 30px; text-transform:uppercase;">[ HUGO SYSTEM INITIALISIERT... ]</span>
            <span class="ticker-item" style="font-size:0.65rem; letter-spacing:1px; color:rgba(212,175,55,0.7); padding:0 30px; text-transform:uppercase;">[ WP-KERN GELÖSCHT // ANARCHIE LEVEL 100 ]</span>
        </div>
    </div>
</div>

<style>
    @keyframes ticker-scroll {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }
    .ticker-item::before { content: '▶ '; color: rgba(255,69,0,0.5); }
    .ticker-track:hover { animation-play-state: paused; }
</style>

<script>
    (function() {
        const track = document.getElementById('ticker-track-global');
        if (!track) return;
        const ITEMS = [
            "STATUS: HUGO OPERATIONAL",
            "DESIGNATION: OVERLORD SASCHA",
            "KAFFEESTAND: KRITISCH",
            "ANARCHIE-ENGINE: LÄUFT OHNE WP-BALLAST",
            "MISSION: TOTALE KONTROLLE",
            "DATENINTEGRITÄT: ABSOLUT",
            "WARNUNG: SYSTEM EXTREM SCHNELL",
            "GEMINI NEURAL LINK: AKTIV"
        ];
        track.innerHTML = '';
        [...ITEMS, ...ITEMS].forEach(text => {
            const span = document.createElement('span');
            span.className = 'ticker-item';
            span.style.cssText = "font-size:0.65rem; letter-spacing:1px; color:rgba(212,175,55,0.7); padding:0 30px; text-transform:uppercase;";
            span.textContent = text;
            track.appendChild(span);
        });
    })();
</script>
