<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="{{ if .IsHome }}home-page{{ end }} {{ if eq .Section "personen" }}bg-steampunk{{ end }} {{ block "body_class" . }}{{ end }}">
    <!-- BACKGROUND GEARS -->
    <div class="bg-gear gear-left">⚙</div>
    <div class="bg-gear gear-right">⚙</div>

    {{ partial "header.html" . }}
    
    <main class="container">
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
    {{ partial "ticker.html" . }}

    <script src="/js/script.js"></script>
</body>
</html>
